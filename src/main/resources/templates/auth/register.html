<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registrazione</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
	<div class="container d-flex justify-content-center align-items-center vh-100">
		<div class="card shadow">
			<div class="card-header bg-primary text-white">
				
				<h3>Login</h3>
			</div>
			<div class="card-body p-4">
				<p th:if="${error}" class="text-danger text-center">
				    [[${error}]]
				</p>
				<form th:action="@{/register}" method="post" th:object=${user}>
				    <div class="mt-3">
				        <label class="form-label">Username:</label>
				        <input type="text" name="username" class="form-control" th:field="*{username}"/>
				    </div>
					<div class="mt-3">
				        <label class="form-label">Email:</label>
				        <input type="email" name="email" class="form-control" th:field="*{email}"/>
				    </div>
				    <div class="mt-3">
				        <label class="form-label">Password:</label>
				        <input type="password" name="password" class="form-control" th:field="*{password}"/>
				    </div>
					<div class="mt-3">
					    <button type="submit" class="btn btn-primary">Registrati</button>
					</div>
				</form>
			</div>
			
		</div>
	</div>

</body>
</html>
