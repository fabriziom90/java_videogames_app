<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
	<div class="container d-flex justify-content-center align-items-center vh-100">
		<div class="card shadow">
			<div class="card-header bg-primary text-white">
				
				<h3>Login</h3>
			</div>
			<div class="card-body p-4">
				<p th:if="${param.error}" class="text-danger">
				    Username o password errati
				</p>
				<p th:if="${param.logout}" class="text-success">
				    Logout effettuato con successo
				</p>
				<p th:if="${success}" class="text-success text-center">
				    [[${success}]]
				</p>
				
				<p th:if="${error}" class="text-danger text-center">
				    [[${error}]]
				</p>
				<form th:action="@{/login}" method="post">
				    <div class="mt-3">
				        <label class="form-label">Username:</label>
				        <input type="text" name="username" class="form-control"/>
				    </div>
				
				    <div class="mt-3">
				        <label class="form-label">Password:</label>
				        <input type="password" name="password" class="form-control"/>
				    </div>
					<div class="mt-3">
					    <button type="submit" class="btn btn-primary">Login</button>
					</div>
					<div class="mt-2">
						<a th:href="@{/register}">Non hai un account? Registrati</a>
					</div>
				</form>
			</div>
			
		</div>
	</div>

</body>
</html>
